services:
  - type: web
    name: haco-rfid-crm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic stamp head && alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
