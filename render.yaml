services:
  - type: web
    name: haco-rfid-crm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        placeholder: "Crie seu banco no Neon.tech e cole a URL aqui"
      - key: PYTHON_VERSION
        value: 3.11.0
